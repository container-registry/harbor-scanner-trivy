---
name: Main Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "helm/**"

permissions:
  contents: read

concurrency:
  group: main-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-image:
    name: Publish Latest Image
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-image.yml
    with:
      checkout_ref: ${{ github.sha }}
      image_tag: latest
      # version omitted: publish-image derives it via git describe
      registry_address: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      registry_project: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
