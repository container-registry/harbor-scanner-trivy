---
name: PR Title

# pull_request (not pull_request_target): the action only reads the PR title
# via the API, so the fork-safe read-only token is sufficient.
on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50  # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            upstream
          requireScope: false
          subjectPattern: ^.{1,100}$
          subjectPatternError: |
            Subject must be 100 characters or less.
