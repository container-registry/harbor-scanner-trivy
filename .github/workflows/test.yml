---
name: Test

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "helm/**"
      - "LICENSE"
      - "NOTICE"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "helm/**"
      - "LICENSE"
      - "NOTICE"

permissions:
  contents: read

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-unit:
    name: Unit Tests
    # Needs a host-local docker daemon and OS tooling; the org's self-hosted
    # ARC runners use a shared DinD daemon that cannot see runner bind mounts.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version-file: go.mod
          go-sum-path: go.sum

      - uses: ./.github/actions/setup-task
        with:
          version: 3.49.1

      - name: Run unit tests
        run: task test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage
          path: coverage.txt
          if-no-files-found: warn

  test-integration:
    name: Integration Tests
    # Needs a host-local docker daemon and OS tooling; the org's self-hosted
    # ARC runners use a shared DinD daemon that cannot see runner bind mounts.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version-file: go.mod
          go-sum-path: go.sum

      - uses: ./.github/actions/setup-task
        with:
          version: 3.49.1

      # The scanner shells out to the trivy CLI; install it at the pinned
      # base-image version so tests match what ships in the image.
      - name: Install Trivy
        run: |
          . ./versions.env
          v="${TRIVY_BASE_IMAGE_VERSION}"
          curl -sSfL -O "https://github.com/aquasecurity/trivy/releases/download/v${v}/trivy_${v}_Linux-64bit.tar.gz"
          curl -sSfL -o trivy_checksums.txt "https://github.com/aquasecurity/trivy/releases/download/v${v}/trivy_${v}_checksums.txt"
          grep "trivy_${v}_Linux-64bit.tar.gz" trivy_checksums.txt | sha256sum -c -
          tar -xzf "trivy_${v}_Linux-64bit.tar.gz" trivy
          sudo install trivy /usr/local/bin/trivy
          trivy --version

      - name: Run integration tests
        run: task test:integration

  test-component:
    name: Component Tests
    # Needs a host-local docker daemon and OS tooling; the org's self-hosted
    # ARC runners use a shared DinD daemon that cannot see runner bind mounts.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version-file: go.mod
          go-sum-path: go.sum

      - uses: ./.github/actions/setup-task
        with:
          version: 3.49.1

      - name: Run component tests
        run: task test:component
