---
name: Release Please

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-image:
    name: Publish Release Image
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-image.yml
    with:
      checkout_ref: ${{ needs.release-please.outputs.tag_name }}
      image_tag: ${{ needs.release-please.outputs.tag_name }}
      version: ${{ needs.release-please.outputs.version }}
      registry_address: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      registry_project: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
    secrets:
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

  publish-helm-chart:
    name: Publish Helm Chart
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          go: "false"

      - name: Log in to helm registry
        env:
          REGISTRY_USERNAME: ${{ vars.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          helm registry login "${REGISTRY_ADDRESS}" \
            --username "${REGISTRY_USERNAME}" \
            --password-stdin <<< "${REGISTRY_PASSWORD}"

      - name: Package and push chart
        run: |
          task helm:package \
            REGISTRY_ADDRESS="${REGISTRY_ADDRESS}" \
            REGISTRY_PROJECT="${REGISTRY_PROJECT}"
          task helm:push \
            REGISTRY_ADDRESS="${REGISTRY_ADDRESS}" \
            REGISTRY_PROJECT="${REGISTRY_PROJECT}"

  update-release-notes:
    name: Update Release Notes
    needs: [release-please, publish-image, publish-helm-chart]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
      VERSION: ${{ needs.release-please.outputs.version }}
      IMAGE_DIGEST: ${{ needs.publish-image.outputs.digest }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Append artifact details to release notes
        run: |
          REGISTRY="${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}"

          # Idempotency: a re-run must not stack another artifact section
          if gh release view "${TAG_NAME}" --json body -q .body | grep -q "^## Container Image$"; then
            echo "Release notes already contain the artifact section; skipping."
            exit 0
          fi

          {
            gh release view "${TAG_NAME}" --json body -q .body
            echo ""
            echo "---"
            echo ""
            echo "## Container Image"
            echo ""
            echo "Multi-arch image (\`linux/amd64\`, \`linux/arm64\`) signed with [cosign](https://github.com/sigstore/cosign)."
            echo ""
            echo "| Image | Reference |"
            echo "|-------|-----------|"
            echo "| \`harbor-scanner-trivy\` | \`${REGISTRY}/harbor-scanner-trivy:${TAG_NAME}\` |"
            echo ""
            echo "**Verify the image signature:**"
            echo "\`\`\`sh"
            echo "cosign verify \\"
            echo "  --certificate-identity \"https://github.com/${GH_REPO}/.github/workflows/publish-image.yml@refs/heads/main\" \\"
            echo "  --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" \\"
            echo "  ${REGISTRY}/harbor-scanner-trivy:${TAG_NAME}"
            echo "\`\`\`"
            echo ""
            echo "**Verify the SBOM attestation:**"
            echo "\`\`\`sh"
            echo "cosign verify-attestation \\"
            echo "  --certificate-identity \"https://github.com/${GH_REPO}/.github/workflows/publish-image.yml@refs/heads/main\" \\"
            echo "  --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" \\"
            echo "  --type spdxjson \\"
            echo "  ${REGISTRY}/harbor-scanner-trivy@${IMAGE_DIGEST}"
            echo "\`\`\`"
            echo ""
            echo "## Helm Chart"
            echo ""
            echo "\`\`\`sh"
            echo "helm install harbor-scanner-trivy \\"
            echo "  oci://${REGISTRY}/charts/harbor-scanner-trivy \\"
            echo "  --version ${VERSION}"
            echo "\`\`\`"
          } | gh release edit "${TAG_NAME}" --notes-file -
