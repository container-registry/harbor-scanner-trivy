---
name: CI

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - "NOTICE"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - "NOTICE"
  schedule:
    # Weekly vulnerability sweep of main (only the vuln-check job runs)
    - cron: "0 6 * * 1"

permissions:
  contents: read

# The event name is part of the group so the weekly scheduled run cannot
# cancel an in-flight push run on main (or vice versa).
concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Binaries
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Cross-compile all release platforms
        run: task build PLATFORMS=linux/amd64,linux/arm64

  test-unit:
    name: Unit Tests
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run unit tests
        run: task test

  test-integration:
    name: Integration Tests
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      # The scanner shells out to the trivy CLI; install it at the pinned
      # base-image version so tests match what ships in the image.
      - name: Install Trivy
        run: |
          . ./versions.env
          v="${TRIVY_BASE_IMAGE_VERSION}"
          curl -sSfL -O "https://github.com/aquasecurity/trivy/releases/download/v${v}/trivy_${v}_Linux-64bit.tar.gz"
          curl -sSfL -o trivy_checksums.txt "https://github.com/aquasecurity/trivy/releases/download/v${v}/trivy_${v}_checksums.txt"
          grep "trivy_${v}_Linux-64bit.tar.gz" trivy_checksums.txt | sha256sum -c -
          tar -xzf "trivy_${v}_Linux-64bit.tar.gz" trivy
          sudo install trivy /usr/local/bin/trivy
          trivy --version
      - name: Run integration tests
        run: task test:integration

  test-component:
    name: Component Tests
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run component tests
        run: task test:component

  lint-go:
    name: Go Lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run Go lint
        run: task lint:local

  lint-yaml:
    name: YAML Lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          go: "false"
      - name: Run YAML lint
        run: task lint:yaml

  helm-lint:
    name: Helm Lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          go: "false"
      - name: Lint Helm chart
        run: task helm:lint

  vuln-check:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run govulncheck
        run: task vuln-check
