---
name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,12 * * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

env:
  UPSTREAM_REPO: goharbor/harbor-scanner-trivy
  GH_TOKEN: ${{ github.token }}

jobs:
  sync:
    name: Sync upstream main and releases
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout fork
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Sync upstream
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git remote get-url upstream >/dev/null 2>&1; then
            git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          fi

          git fetch --force --prune origin \
            "+refs/heads/main:refs/remotes/origin/main" \
            "+refs/tags/*:refs/tags/*"
          git fetch --force --prune upstream \
            "+refs/heads/main:refs/remotes/upstream/main" \
            "+refs/tags/*:refs/tags/upstream/*"

          fork_commit_shas() {
            git cherry -v upstream/main origin/main | awk '$1 == "+" { print $2 }'
          }

          fork_commit_summary() {
            git cherry -v upstream/main origin/main || true
          }

          list_fork_tags() {
            git for-each-ref --format='%(refname:strip=2)' refs/tags/v* \
              | awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ { print }' \
              | sort -V
          }

          list_fork_release_tags() {
            gh release list --repo "${GITHUB_REPOSITORY}" --limit 100 \
              --json tagName --jq '.[].tagName' \
              | awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ { print }' \
              | sort -V
          }

          list_upstream_release_tags() {
            git for-each-ref --format='%(refname:strip=3)' refs/tags/upstream/v* \
              | awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ { print }' \
              | sort -V
          }

          version_gt() {
            local left="$1"
            local right="$2"

            if [[ -z "${right}" ]]; then
              return 0
            fi

            [[ "${left}" != "${right}" ]] \
              && [[ "$(printf '%s\n%s\n' "${right}" "${left}" | sort -V | tail -n 1)" == "${left}" ]]
          }

          create_manual_pr() {
            local branch="$1"
            local target_ref="$2"
            local title="$3"
            local reason="$4"
            local details="$5"

            git rebase --abort >/dev/null 2>&1 || true
            git cherry-pick --abort >/dev/null 2>&1 || true
            git checkout -B "${branch}" "${target_ref}"

            cat > CONFLICTS.md <<EOF
          # Upstream sync needs manual resolution

          @bupd @vad1mo

          ${reason}

          ## Target

          - Repository: ${GITHUB_REPOSITORY}
          - Upstream: ${UPSTREAM_REPO}
          - Target ref: ${target_ref}
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          ## Details

          ${details}

          ## Fork commits considered

          \`\`\`
          $(fork_commit_summary)
          \`\`\`

          Resolve this manually, remove this file, and merge the resolved upstream sync into main.
          EOF

            git add CONFLICTS.md
            git commit -m "chore: document upstream sync action required"
            git fetch --force origin \
              "+refs/heads/${branch}:refs/remotes/origin/${branch}" >/dev/null 2>&1 || true
            git push --force-with-lease origin "HEAD:${branch}"

            local pr_number
            pr_number="$(gh pr list --repo "${GITHUB_REPOSITORY}" \
              --head "${branch}" --state open --json number --jq '.[0].number' || true)"

            if [[ -n "${pr_number}" ]]; then
              gh pr edit "${pr_number}" --repo "${GITHUB_REPOSITORY}" \
                --title "${title}" --body-file CONFLICTS.md
            else
              gh pr create --repo "${GITHUB_REPOSITORY}" \
                --base main --head "${branch}" \
                --title "${title}" --body-file CONFLICTS.md
            fi
          }

          sync_main() {
            git checkout -B main origin/main

            if ! git rebase upstream/main; then
              local conflicts
              conflicts="$(git diff --name-only --diff-filter=U || true)"
              create_manual_pr \
                "upstream-sync/main" \
                "upstream/main" \
                "Manual resolution needed: upstream main sync" \
                "Automatic rebase of fork main onto upstream main failed." \
                "Failed command: git rebase upstream/main

          Conflicted files:
          ${conflicts}"
              exit 1
            fi

            git push --force-with-lease origin HEAD:main
            git update-ref refs/remotes/origin/main HEAD
          }

          write_release_notes() {
            local tag="$1"
            local upstream_sha="$2"
            local release_sha="$3"

            cat > release-notes.md <<EOF
          Synced from upstream ${UPSTREAM_REPO}@${tag}.

          - Upstream tag commit: ${upstream_sha}
          - Fork release commit: ${release_sha}

          Fork commits applied:

          \`\`\`
          $(fork_commit_summary)
          \`\`\`
          EOF
          }

          prepare_release_commit() {
            local tag="$1"
            local target_ref="refs/tags/upstream/${tag}"
            local work_branch="upstream-release-work/${tag}"
            local commit
            mapfile -t patch_commits < <(fork_commit_shas)

            git checkout -B "${work_branch}" "${target_ref}"

            for commit in "${patch_commits[@]}"; do
              if ! git cherry-pick "${commit}"; then
                local conflicts
                conflicts="$(git diff --name-only --diff-filter=U || true)"
                create_manual_pr \
                  "upstream-sync/release-${tag}" \
                  "${target_ref}" \
                  "Manual resolution needed: release ${tag}" \
                  "Automatic cherry-pick of fork commits onto upstream release ${tag} failed." \
                  "Failed command: git cherry-pick ${commit}

          Conflicted files:
          ${conflicts}"
                exit 1
              fi
            done

            EXPECTED_RELEASE_SHA="$(git rev-parse HEAD)"
          }

          process_release() {
            local tag="$1"
            local upstream_sha
            local existing_sha=""

            upstream_sha="$(git rev-parse "refs/tags/upstream/${tag}^{commit}")"
            prepare_release_commit "${tag}"

            if git show-ref --verify --quiet "refs/tags/${tag}"; then
              existing_sha="$(git rev-parse "refs/tags/${tag}^{commit}")"
              if [[ "${existing_sha}" != "${EXPECTED_RELEASE_SHA}" ]]; then
                create_manual_pr \
                  "upstream-sync/release-${tag}" \
                  "${EXPECTED_RELEASE_SHA}" \
                  "Manual action needed: release ${tag} tag mismatch" \
                  "Fork tag ${tag} already exists but does not point at the expected synced release commit. The workflow will not move existing tags." \
                  "Existing tag commit: ${existing_sha}
          Expected tag commit: ${EXPECTED_RELEASE_SHA}"
                exit 1
              fi
            else
              git tag -a "${tag}" "${EXPECTED_RELEASE_SHA}" -m "Release ${tag}"
              git push origin "refs/tags/${tag}"
            fi

            if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              echo "Release ${tag} already exists and points at ${EXPECTED_RELEASE_SHA}; skipping."
              return
            fi

            write_release_notes "${tag}" "${upstream_sha}" "${EXPECTED_RELEASE_SHA}"
            gh release create "${tag}" --repo "${GITHUB_REPOSITORY}" \
              --title "${tag}" --notes-file release-notes.md
          }

          sync_releases() {
            mapfile -t upstream_tags < <(list_upstream_release_tags)
            if [[ "${#upstream_tags[@]}" -eq 0 ]]; then
              echo "No upstream release tags found."
              return
            fi

            local latest_fork_release=""
            local latest_fork_tag=""
            local threshold=""
            local include_threshold="false"
            latest_fork_release="$(list_fork_release_tags | tail -n 1 || true)"
            latest_fork_tag="$(list_fork_tags | tail -n 1 || true)"

            if [[ -n "${latest_fork_release}" ]]; then
              threshold="${latest_fork_release}"
            else
              threshold="${latest_fork_tag}"
              include_threshold="true"
            fi

            if [[ -z "${threshold}" ]]; then
              process_release "${upstream_tags[-1]}"
              return
            fi

            local tag
            for tag in "${upstream_tags[@]}"; do
              if version_gt "${tag}" "${threshold}" \
                || [[ "${include_threshold}" == "true" && "${tag}" == "${threshold}" ]]; then
                process_release "${tag}"
              fi
            done
          }

          sync_main
          sync_releases
