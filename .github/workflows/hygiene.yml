---
name: Hygiene

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: hygiene-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typos:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run typos
        run: |
          set -o pipefail

          # Single source of truth for the pin is versions.env
          TYPOS_VERSION="$(grep '^TYPOS_VERSION=' versions.env | cut -d= -f2)"
          TYPOS_SHA256="$(grep '^TYPOS_SHA256_LINUX_X86_64=' versions.env | cut -d= -f2)"

          # This job runs on ubuntu-latest (x86_64) only; the checksum pin in
          # versions.env covers exactly that asset (upstream publishes none).
          target="x86_64-unknown-linux-musl"
          if [ "$(uname -m)" != "x86_64" ]; then
            echo "::error::typos checksum is pinned for x86_64 only; got $(uname -m)"
            exit 1
          fi

          install_dir="$(mktemp -d)"
          curl -fsSL "https://github.com/crate-ci/typos/releases/download/v${TYPOS_VERSION}/typos-v${TYPOS_VERSION}-${target}.tar.gz" -o /tmp/typos.tar.gz
          echo "${TYPOS_SHA256}  /tmp/typos.tar.gz" | sha256sum -c -
          tar -xzf /tmp/typos.tar.gz -C "$install_dir" --strip-components=1 --no-same-owner --no-same-permissions
          typos="$install_dir/typos"

          # 1) Check markdown files directly
          find . -type f -name '*.md' -not -path './.git/*' \
            | "$typos" --config .typos.toml --file-list - --force-exclude

          # 2) Check only comments in YAML files.
          #    Extract comment text (full-line and inline) preserving line numbers.
          #    Non-comment lines become empty so typos reports correct positions.
          comment_dir="$(mktemp -d)"
          find . -type f \( -name '*.yml' -o -name '*.yaml' \) \
            -not -path './.git/*' | while IFS= read -r f; do
            dest="$comment_dir/$f"
            mkdir -p "$(dirname "$dest")"
            awk '{
              # Full-line comment (most common)
              if (/^[[:space:]]*#/) {
                sub(/^[[:space:]]*#[[:space:]]?/, ""); print; next
              }
              # Inline comment: walk line tracking quotes, find " #" outside strings
              n = length($0); dq = 0; sq = 0; cs = 0
              for (j = 1; j <= n; j++) {
                c = substr($0, j, 1)
                if (c == "\"" && !sq) dq = !dq
                else if (c == "\047" && !dq) sq = !sq
                else if (c == "#" && !dq && !sq && j > 1 && substr($0, j-1, 1) == " ") {
                  cs = j; break
                }
              }
              if (cs) { s = substr($0, cs + 1); sub(/^[[:space:]]?/, "", s); print s }
              else print ""
            }' "$f" > "$dest"
          done
          # Run from inside comment_dir so paths are repo-relative,
          # matching extend-exclude patterns in .typos.toml.
          (
            cd "$comment_dir"
            find . -type f \( -name '*.yml' -o -name '*.yaml' \) \
              | "$typos" --config "$GITHUB_WORKSPACE/.typos.toml" --file-list - --force-exclude
          )

  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02  # v0.6.0
        with:
          inputs: .
          online-audits: true
          persona: regular

  pinned-actions:
    name: Check Pinned Action SHAs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Check all actions are pinned to full SHA with version comment
        run: |
          failed=0
          while IFS= read -r file; do
            # `|| [ -n "$line" ]` still processes a final line without a trailing newline
            while IFS= read -r line || [ -n "$line" ]; do
              if echo "$line" | grep -qE '^\s*(-\s+)?uses:\s+'; then
                ref=$(echo "$line" | sed 's/.*uses:[[:space:]]*//' | awk '{print $1}')
                # Skip local actions (starting with ./) and docker:// references
                if echo "$ref" | grep -qE '^(\.\/|docker://)'; then
                  continue
                fi
                if ! echo "$line" | grep -qE '@[a-f0-9]{40}[[:space:]]+#[[:space:]]*v[0-9]'; then
                  echo "UNPINNED OR MISSING '# vX.Y.Z' COMMENT: $file -> $ref"
                  failed=1
                fi
              fi
            done < "$file"
          done < <(find .github/workflows .github/actions -name '*.yml' -o -name '*.yaml')
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "All 'uses:' references must be pinned to a full 40-char commit SHA"
            echo "followed by a version comment."
            echo "Example: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0"
            exit 1
          fi
          echo "All actions are pinned."

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    # Requires Dependency Graph to be enabled in repo settings; this is a
    # real gate (fail-on-severity), so it must not be continue-on-error.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
