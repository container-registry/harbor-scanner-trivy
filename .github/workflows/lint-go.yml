---
name: Lint

on:
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yaml"
      - "Taskfile.yml"
      - "versions.env"
      - "**/*.yml"
      - "**/*.yaml"
      - ".yamllint"
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yaml"
      - "Taskfile.yml"
      - "versions.env"
      - "**/*.yml"
      - "**/*.yaml"
      - ".yamllint"

permissions:
  contents: read

concurrency:
  group: lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-go:
    name: Go Lint
    runs-on: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository || contains(fromJSON('["OWNER","MEMBER"]'), github.event.pull_request.author_association)) && vars.RUNNER || 'ubuntu-latest' }}
    env:
      GOLANGCI_LINT_CACHE: ${{ github.workspace }}/.ci-cache/golangci-lint
      XDG_CACHE_HOME: ${{ github.workspace }}/.ci-cache/xdg
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version-file: go.mod
          go-sum-path: go.sum

      - uses: ./.github/actions/setup-task
        with:
          version: 3.49.1

      - name: Run Go lint
        run: task lint:local

  lint-yaml:
    name: YAML Lint
    # ubuntu-latest ships pipx, which `task lint:yaml` falls back to; the
    # org's ARC runner image does not.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-task
        with:
          version: 3.49.1

      - name: Run YAML lint
        run: task lint:yaml
